name: Daily Price Tracker

on:
  schedule:
    # 10:00 UTC is exactly 6:00 AM EDT (Eastern Daylight Time) / 5:00 AM EST (Eastern Standard Time)
    - cron: '0 10 * * *'
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to push commits to the repo

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Run Tracker Script
        run: node scripts/update-prices.js

      - name: Commit and Push Changes
        run: |
          git config --global user.name "Muhad Shahid"
          git config --global user.email "smuhad40@gmail.com"
          git add data/historical_logs.json
          # Only commit if there are actual changes to avoid failing the action
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: daily price tracking update [skip ci]"
          git push
